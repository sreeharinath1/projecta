name: zh.junitworkflow

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Runs unit + integration tests + jacoco
      - name: Run Tests
        run: mvn clean verify
        working-directory: springboot-demo

      - name: Publish Unit Test reports
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: springboot-demo/target/surefire-reports/*.xml
          check_name: "Unit Test Results"
          include_passed: true

      - name: Publish Integration Tests
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: springboot-demo/target/failsafe-reports/*.xml
          check_name: "Integration Test Results"
          include_passed: true

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            springboot-demo/target/surefire-reports
            springboot-demo/target/failsafe-reports
            springboot-demo/target/site/jacoco
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results Summary 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
