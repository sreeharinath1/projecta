name: i.includeexcludematrix
on:
  workflow_dispatch:
    inputs:
      env:
        description: " Enter env"
        type: choice
        options: [dev, stage]
jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
        include:
          - os: ubuntu-latest
            node-version: 18
            experimental: true
        exclude:
          - os: windows-latest
            node-version: 22
            experimental: true
      fail-fast: false
      max-parallel: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
      - run: echo "done"