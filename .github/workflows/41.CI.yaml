name: CI
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  checks: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — BUILD  (9 matrix combinations)
  # ─────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: [11, 17, 21]
      fail-fast: false
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      # STEP 1
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # Required for SonarQube blame analysis

      # STEP 2
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven              # was missing

      # STEP 3 — moved UP before any mvn command
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2               # was 'paths' (plural = wrong key)
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-   # was '${{runner.os}}-,2'

      # STEP 4
      - name: Run Unit Tests
        run: mvn clean test
        working-directory: springboot-demo

      # STEP 5
      - name: Run Integration Tests
        run: mvn clean verify
        working-directory: springboot-demo

      # STEP 6
      - name: Install Snyk CLI
        run: npm install -g snyk

      # STEP 7
      - name: Snyk Auth
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth ${{ secrets.SNYK_TOKEN }}  # was: ${ SNYK_TOKEN }}

      # STEP 8
      - name: Snyk Test (dependency scan)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --maven-aggregate-project \
            --sarif-file-output=snyk.sarif \
            --severity-threshold=high
        working-directory: springboot-demo
        # was: snyk.tarrif (typo)

      # STEP 9 — was completely missing
      - name: Upload Snyk SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: springboot-demo/snyk.sarif

      # STEP 10
      - name: Snyk Monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --maven-aggregate-project
        working-directory: springboot-demo

      # STEP 11 — was completely missing
      - name: Publish JUnit Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            springboot-demo/target/surefire-reports/*.xml
            springboot-demo/target/failsafe-reports/*.xml
          check_name: "Test Results (${{ matrix.os }} / Java ${{ matrix.java-version }})"
          include_passed: true

      # STEP 12 — was completely missing
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.os }}-java${{ matrix.java-version }}
          path: |
            springboot-demo/target/surefire-reports
            springboot-demo/target/failsafe-reports
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — PACKAGE
  # ─────────────────────────────────────────────
  package:                          # was 'Package' (capital P) — breaks needs: reference
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version: ${{ steps.ver.outputs.version }}   # was missing
    steps:
      # STEP 1
      - name: Checkout
        uses: actions/checkout@v4

      # STEP 2
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # STEP 3
      - name: Package
        run: mvn clean package -DskipTests
        working-directory: springboot-demo    # was missing

      # STEP 4
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: springboot-demo/target/*.jar
          if-no-files-found: error            # was: if-no-file-found (missing 's')
          retention-days: 90
          overwrite: true
          compression-level: 6

      # STEP 5 — was completely missing
      - name: Set version output
        id: ver
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 3 — QUALITY
  # ─────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    needs: package
    steps:
      # STEP 1
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # REQUIRED — SonarQube needs full history

      # STEP 2 — was completely missing
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # STEP 3
      - name: Download Artifact
        uses: actions/download-artifact@v4    # was: name: actions/download-artifact@v4
        with:
          name: myapp
          path: ./download

      # STEP 4
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey="myproject" \
            -Dsonar.projectName="sree" \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.login="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=true
        working-directory: springboot-demo
        # was: ${ SONARQUBE_HOST_URL } with spaces inside braces

      # STEP 5
      - name: Quality Gate Check
        id: qualitycheck              # was indented under uses: — must be step-level
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        with:
          scanMetadataReportFile: springboot-demo/target/sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}

      # STEP 6 — was completely missing
      - name: Annotate gate result
        if: always()
        run: |
          if [ "${{ steps.qualitycheck.conclusion }}" == "success" ]; then
            echo "::notice::Quality Gate PASSED — proceeding to image build"
          else
            echo "::error::Quality Gate FAILED — image build will be skipped"
          fi

  # ─────────────────────────────────────────────
  # JOB 4 — IMAGE BUILD + SECURITY SCAN
  # ─────────────────────────────────────────────
  imagecreating:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      # STEP 1 — was completely missing
      - name: Checkout
        uses: actions/checkout@v4

      # STEP 2
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # STEP 3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:                        # was: 'with' missing the colon
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp
          path: ./download

      # STEP 5
      - name: Extract Metadata
        id: meta                     # was indented under uses: — must be step-level
        uses: docker/metadata-action@v5
        with:
          images: myuser/myapp
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=ref,event=branch

      # STEP 6
      - name: Build and Push Image
        uses: docker/build-push-action@v5    # was: missing name + wrong indentation
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # STEP 7 — was incomplete sentence, not a valid step
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myuser/myapp:latest
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'            # don't fail the step — upload result first

      # STEP 8 — was completely missing
      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

      # STEP 9 — was completely missing
      - name: Job Summary
        if: always()
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.package.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | completed |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5 — FAILURE NOTIFICATION (recommended)
  # ─────────────────────────────────────────────
  notify-failure:
    runs-on: ubuntu-latest
    needs: [build, package, quality, imagecreating]
    if: ${{ failure() }}
    steps:
      - name: Send failure alert
        run: |
          echo "Pipeline failed"
          echo "Failed jobs: ${{ toJSON(needs) }}"
          # Replace with: Slack webhook, email action, PagerDuty, etc.
