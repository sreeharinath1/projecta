name: zj.repotrigger
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      run: |
        curl -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer ${{  secrets.G_PAT }}" \
        https://api.github.com/repos/sreeharinath1/github_actions/dispatches \
        -d '{"event_type":"deploy"}'
